<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Deavy Karreman">

    <title>Portfolio</title>
    <!-- CSS files -->

    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.3.1/css/bulma.min.css">
    <link rel="stylesheet" type="text/css" href="assets/css/styles.css">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.png">
</head>
<body>
    <!-- Navbar -->
    <nav class="nav container void-background">
        <div class="nav-left">
            <a href="https://deavyk.github.io/" class="nav-item">
                <span class="icon">
                    <i class="fa-solid fa-house"></i>
                </span>
            </a>
            <a href="https://www.youtube.com/channel/UCU6Z3y5UGFzA0x-zPeJdwvw" class="nav-item">
                <span class="icon">
                    <i class="fa-brands fa-youtube"></i>
                </span>
            </a>
            <a href="https://www.instagram.com/deavy_karreman/" class="nav-item">
                <span class="icon">
                    <i class="fa-brands fa-instagram"></i>
                </span>
            </a>
            <a href="https://www.tiktok.com/@deavykarreman" class="nav-item">
                <span class="icon">
                    <i class="fa-brands fa-tiktok"></i>
                </span>
            </a>
        </div>

        <div class="nav-right nav-menu">
            <a class="nav-item" href="#about">About</a>
            <a class="nav-item" href="#projects">Projects</a>
            <a class="nav-item" href="#social">Social</a>
        </div>

        <span class="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </span>
    </nav>

    <!-- About Me -->
    <section id="about" class="section section-1">
        <div class="container has-text-centered">
            <img class="avatar" src="assets/img/profile.png" alt="Profile Picture">
        </div>
        <div class="container">
            <br>
            <p class="intro">YOOOO test</p>
        </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section section-2">
        <div class="container">
            <div class="has-text-centered">
                <h3 class="title is-3">Projects</h3>
            </div>

            <div class="columns is-multiline is-desktop">
                <!-- Project 1 -->
                <div class="column">
                    <div class="box project-text">
                        <article>
                            <div>
                                <figure class="image project-figure">
                                    <img src="assets/img/project-1.jpg" alt="Project 1 Image">
                                </figure>
                            </div>
                            <div>
                                <p>
                                    Omdat ik veel game, heb ik gekozen om een PC te kopen. Ik heb deze zelf gebouwd om nieuwe dingen te leren.
                                </p>
                            </div>
                        </article>
                    </div>
                </div>
                <!-- Project 2 -->
                <div class="column">
                    <div class="box project-text">
                        <article>
                            <div>
                                <figure class="image project-figure">
                                    <img src="assets/img/project-2.jpg" alt="Project 2 Image">
                                </figure>
                            </div>
                            <div>
                                <p>
                                    Dit is mijn huidige setup, ik probeer hem altijd uit te breiden met nieuwere en betere spullen.
                                </p>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Social -->
    <section id="social" class="section section-3">
        <div class="container">
            <div class="has-text-centered">
                <h3 class="title is-3">Socials</h3>
            </div>
            <div class="social-container columns is-mobile">
                <div class="column is-6 has-text-centered">
                    <a target="_blank" href="https://www.youtube.com/channel/UCU6Z3y5UGFzA0x-zPeJdwvw" class="nav-item">
                        <span class="icon">
                            <i class="fa-brands fa-youtube" style="font-size: 100px; color: Crimson;"></i>
                        </span>
                    </a>
                </div>
                <div class="column is-6 has-text-centered">
                    <a target="_blank" href="https://www.tiktok.com/@deavykarreman" class="nav-item">
                        <span class="icon">
                            <i class="fa-brands fa-tiktok" style="font-size: 100px; color: Crimson;"></i>
                        </span>
                    </a>
                </div>
                <div class="column is-6 has-text-centered">
                    <a target="_blank" href="https://www.instagram.com/deavy_karreman/" class="nav-item">
                        <span class="icon">
                            <i class="fa-brands fa-instagram" style="font-size: 100px; color: Crimson;"></i>
                        </span>
                    </a>
                </div>
                <div class="column is-6 has-text-centered">
                    <a target="_blank" href="https://www.facebook.com/deavy.karreman" class="nav-item">
                        <span class="icon">
                            <i class="fa-brands fa-facebook" style="font-size: 100px; color: Crimson;"></i>
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <section class="section-4 has-text-centered container">
        <a href="https://deavyk.github.io/">Deavy Karreman</a>
    </section>

    <!-- Scripts -->
    <script src="controller.js"></script>

</html>
